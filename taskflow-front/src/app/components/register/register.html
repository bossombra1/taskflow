<div class="auth-container">
  <div class="auth-card">
    <h1>🗂️ TaskFlow</h1>
    <h2>Créer un compte</h2>

    <div class="error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Nom complet</label>
        <input type="text" formControlName="name" placeholder="Jean Dupont" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="vous@email.com" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="Min. 8 caractères" />
      </div>
      <div class="field">
        <label>Confirmer le mot de passe</label>
        <input type="password" formControlName="password_confirmation" placeholder="••••••••" />
      </div>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Inscription...' : 'S\'inscrire' }}
      </button>
    </form>

    <p class="link">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
